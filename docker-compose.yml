services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./secrets:/app/secrets   # Zalo credentials persist here

  9router:
    image: decolua/9router:latest
    ports:
      - "${NINEROUTER_PORT:-20128}:20128"
    volumes:
      - ./9router-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - HOSTNAME=0.0.0.0
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sdk-service:
    build: ./sdk-service
    env_file:
      - .env
    environment:
      - LLM_MODEL=${NINEROUTER_MODEL:-kr/minimax-m2.5}
      - LLM_API_KEY=${NINEROUTER_API_KEY}
      - LLM_BASE_URL=http://9router:20128/v1
      - WORKSPACE_BASE=/workspaces
      - TASK_TIMEOUT=${TASK_TIMEOUT:-600}
      - RUNTIME=local
    depends_on:
      9router:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./workspaces:/workspaces   # Shared workspace (files persist to host)
      - ./:/project                 # Project source code accessible to agent
      - ./logs:/app/logs

  worker:
    build: ./workers
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKSPACE_BASE=/workspaces
      - SDK_SERVICE_URL=http://sdk-service:8080
      - NINEROUTER_URL=http://9router:20128
    depends_on:
      redis:
        condition: service_healthy
      sdk-service:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./workspaces:/workspaces   # Task workspaces (shared with sdk-service)
      - ./logs:/app/logs           # Log files persist here
